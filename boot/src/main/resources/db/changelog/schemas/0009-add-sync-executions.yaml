databaseChangeLog:
  - changeSet:
      id: add-sync-executions
      author: tp2intervals
      changes:
        - createTable:
            tableName: sync_executions
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: schedule_id
                  type: int

              - column:
                  name: trigger_type
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: source_platform
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: target_platform
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: started_at
                  type: datetime
                  constraints:
                    nullable: false

              - column:
                  name: finished_at
                  type: datetime

              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: copied
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: removed
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: skipped_by_type
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: skipped_already_synced
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: failed
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: failed_to_remove
                  type: int
                  defaultValueNumeric: 0

              - column:
                  name: error_message
                  type: varchar(2000)

              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: end_date
                  type: date
                  constraints:
                    nullable: false